experiment:
  type: hyperparameter_sweep
long_running: false
data_governance:
  return_source: adj_nav
  valuation_source: adj_nav
  reward_return_source: adj_nav
  metrics_return_source: adj_nav
  execution_price_source: ohlcv
  valuation_table: core13_adj_nav
  execution_price_table: core13_ohlcv
  valuation_execution_split: true
  reward_valuation_split: true
feature_matrix:
  input_matrix_id: M6
  window_size: 60
feature_reduction:
  pca:
    enabled: true
    explained_variance: 0.95
rebalance:
  mode: daily
execution_activity:
  protocol: daily_gate_with_cost_constraint
  scheduler_blocks_model_actions: false
  activity_gate_enforced: true
  turnover_optimization_protocol_id: turnover_active_v1
  min_model_rebalance_hit_rate: 0.05
  max_model_rebalance_hit_rate: 0.6
  min_non_initial_turnover_per_opportunity: 0.002
baselines:
  traditional: []
  deep: []
  native_rl:
    enabled_models:
    - risk_aware_graph_transformer_constrained_actor_critic
    epochs: 8
    max_train_steps: 2048
    max_validation_steps: 512
    max_gradient_updates_per_epoch: 64
ra_gt_rcpo:
  enabled: true
  rho_policy: straight_through_gumbel_softmax_v1
  rho_actions:
  - 0.0
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  rho_temperature:
    tau_start: 1.0
    tau_end: 0.2
    tau_decay_steps: 2048
    eval_mode: argmax
    min_entropy_threshold: 0.05
  min_gradient_updates_for_formal: 128
  min_env_steps_for_formal: 2048
hpo:
  enabled: true
  equal_budget_across_models: true
  n_trials_per_model: 50
  metric: validation_return_risk_cost_constrained
  objective: validation_return_risk_cost_constrained
  direction: maximize
  selection_split: validation
  final_report_split: test
  trainable_models:
  - risk_aware_graph_transformer_constrained_actor_critic
  search_space:
    ra_gt_rcpo.learning_rate:
      type: float
      low: 1.0e-05
      high: 0.0005
      log: true
      rationale: P16 optimizer learning rate.
    ra_gt_rcpo.lambda_turnover:
      type: float
      low: 0.1
      high: 5.0
      rationale: Turnover Lagrangian multiplier.
    ra_gt_rcpo.lambda_cost:
      type: float
      low: 1.0
      high: 30.0
      rationale: Cost Lagrangian multiplier.
    ra_gt_rcpo.average_cost_per_step_budget:
      type: float
      low: 5.0e-05
      high: 0.001
      rationale: Per-step cost constraint budget.
    ra_gt_rcpo.lambda_cvar:
      type: float
      low: 0.0
      high: 2.0
      rationale: CVaR loss Lagrangian multiplier.
    ra_gt_rcpo.lambda_drawdown:
      type: float
      low: 0.0
      high: 2.0
      rationale: Drawdown Lagrangian multiplier.
    ra_gt_rcpo.cvar_loss_budget:
      type: float
      low: 0.005
      high: 0.04
      rationale: Validation CVaR loss budget.
    ra_gt_rcpo.drawdown_budget:
      type: float
      low: 0.05
      high: 0.15
      rationale: Validation drawdown budget.
    ra_gt_rcpo.graph_edge_threshold:
      type: float
      low: 0.05
      high: 0.4
      rationale: Decision-visible rolling-correlation edge threshold.
    ra_gt_rcpo.transformer_layers:
      type: int
      low: 1
      high: 3
      rationale: Temporal transformer depth.
    ra_gt_rcpo.attention_heads:
      type: categorical
      choices:
      - 2
      - 4
      rationale: Temporal attention heads.
  activity_constraints:
    enabled: true
    scope_baseline_families:
    - new_model_extension
    - platform_native_rl
    scope_activity_protocols:
    - daily_gate_with_cost_constraint
    min_model_rebalance_hit_rate: 0.05
    max_model_rebalance_hit_rate: 0.6
    min_non_initial_turnover_per_opportunity: 0.002
    max_average_turnover: 0.03
    hit_rate_underuse_penalty: 5.0
    turnover_underuse_penalty: 5.0
    turnover_overuse_penalty: 2.0
    cost_budget: 0.01
    cost_over_budget_penalty: 10.0
new_model_protocol:
  phase: P16.4_formal_hpo
  model_extension_id: core13_v2_p16_ra_gt_rcpo_20260525
  selection_split: validation
  test_used_for_model_selection: false
training:
  epochs: 8
  max_train_steps: 2048
  max_validation_steps: 512
  checkpoint_include_replay_buffer: false
reproducibility:
  seed: 42
  seeds:
  - 42
output:
  run_name: P16_formal_ra_gt_rcpo
protocol:
  protocol_id: core13_v2_full_reset_20260522
  asset_universe_id: core13_v2
  data_cutoff_date: '2026-05-20'
rankability:
  rankable_in_unified_table: true
  diagnostic_status: formal
security:
  path_whitelist:
  - /Users/chenjunming/Desktop/DRL_PM
