experiment:
  type: hyperparameter_sweep
long_running: false
data_governance:
  return_source: adj_nav
  valuation_source: adj_nav
  reward_return_source: adj_nav
  metrics_return_source: adj_nav
  execution_price_source: ohlcv
  valuation_table: core13_adj_nav
  execution_price_table: core13_ohlcv
  valuation_execution_split: true
  reward_valuation_split: true
baselines:
  traditional: []
  deep: []
  native_rl:
    enabled_models:
    - graph_transformer_risk_constrained_actor_critic_lite
    epochs: 2
    max_train_steps: 128
    max_validation_steps: 128
    max_gradient_updates_per_epoch: 16
gt_rcpo_lite:
  enabled: true
hpo:
  enabled: true
  equal_budget_across_models: true
  n_trials_per_model: 50
  metric: validation_return_risk_cost_constrained
  objective: validation_return_risk_cost_constrained
  direction: maximize
  selection_split: validation
  final_report_split: test
  trainable_models:
  - graph_transformer_risk_constrained_actor_critic_lite
  search_space:
    gt_rcpo_lite.lambda_turnover:
      type: float
      low: 0.5
      high: 4.0
    gt_rcpo_lite.lambda_cvar:
      type: float
      low: 0.0
      high: 1.0
  activity_constraints:
    enabled: true
    scope_baseline_families:
    - new_model_extension
    - platform_native_rl
    scope_activity_protocols:
    - daily_gate_with_cost_constraint
    min_model_rebalance_hit_rate: 0.05
    max_model_rebalance_hit_rate: 0.6
    min_non_initial_turnover_per_opportunity: 0.002
    max_average_turnover: 0.03
    hit_rate_underuse_penalty: 5.0
    turnover_underuse_penalty: 5.0
    turnover_overuse_penalty: 2.0
    cost_budget: 0.01
    cost_over_budget_penalty: 10.0
new_model_protocol:
  phase: P13.3_formal_scout
  model_extension_id: core13_v2_p12_p13_20260524
  selection_split: validation
  test_used_for_model_selection: false
training:
  epochs: 2
  max_train_steps: 128
  max_validation_steps: 128
  checkpoint_include_replay_buffer: false
reproducibility:
  seed: 42
  seeds:
  - 42
output:
  run_name: P13_gt_rcpo_lite_formal_seed_runner
protocol:
  protocol_id: core13_v2_full_reset_20260522
  asset_universe_id: core13_v2
  data_cutoff_date: '2026-05-20'
rankability:
  rankable_in_unified_table: true
  diagnostic_status: formal
security:
