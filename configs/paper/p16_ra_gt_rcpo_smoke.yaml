    enabled: true
    explained_variance: 0.95
baselines:
  traditional:
  - equal_weight
  deep: []
  native_rl:
    enabled_models:
    - risk_aware_graph_transformer_constrained_actor_critic
    epochs: 1
    max_train_steps: 32
    max_validation_steps: 32
    max_gradient_updates_per_epoch: 8
ra_gt_rcpo:
  enabled: true
  rho_policy: straight_through_gumbel_softmax_v1
