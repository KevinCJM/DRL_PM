experiment:
  type: hyperparameter_sweep
data_governance:
  return_source: adj_nav
  valuation_source: adj_nav
  reward_return_source: adj_nav
  metrics_return_source: adj_nav
  execution_price_source: ohlcv
  valuation_table: core13_adj_nav
  execution_price_table: core13_ohlcv
  valuation_execution_split: true
  reward_valuation_split: true
feature_matrix:
  input_matrix_id: M6
  window_size: 60
feature_reduction:
  pca:
    enabled: true
    explained_variance: 0.95
baselines:
  traditional: []
  deep: []
  native_rl:
    enabled_models:
    - risk_aware_graph_transformer_constrained_actor_critic
    - ra_gt_rcpo_no_graph
    - ra_gt_rcpo_no_transformer
    - ra_gt_rcpo_no_cvar_constraint
    - ra_gt_rcpo_no_cost_constraint
    - ra_gt_rcpo_no_turnover_constraint
    - ra_gt_rcpo_mlp_actor_critic
    epochs: 1
    max_train_steps: 32
    max_validation_steps: 32
    max_gradient_updates_per_epoch: 8
ra_gt_rcpo:
  enabled: true
hpo:
  enabled: true
  equal_budget_across_models: true
  n_trials_per_model: 5
  metric: validation_sharpe_minus_drawdown_turnover_penalty
  objective: validation_sharpe_minus_drawdown_turnover_penalty
  direction: maximize
  selection_split: validation
  final_report_split: validation
  trainable_models:
  - risk_aware_graph_transformer_constrained_actor_critic
  - ra_gt_rcpo_no_graph
  - ra_gt_rcpo_no_transformer
  - ra_gt_rcpo_no_cvar_constraint
  - ra_gt_rcpo_no_cost_constraint
  - ra_gt_rcpo_no_turnover_constraint
  - ra_gt_rcpo_mlp_actor_critic
  search_space:
    ra_gt_rcpo.learning_rate:
      type: float
      low: 1.0e-5
      high: 5.0e-4
      log: true
    ra_gt_rcpo.lambda_turnover:
      type: float
      low: 0.1
      high: 5.0
    ra_gt_rcpo.lambda_cost:
      type: float
      low: 1.0
      high: 30.0
    ra_gt_rcpo.lambda_cvar:
      type: float
      low: 0.0
      high: 2.0
    ra_gt_rcpo.lambda_drawdown:
      type: float
      low: 0.0
      high: 2.0
new_model_protocol:
  phase: P16.2_validation_ablation
  model_extension_id: core13_v2_p16_ra_gt_rcpo_20260525
  selection_split: validation
  test_used_for_model_selection: false
training:
  epochs: 1
  max_train_steps: 32
  max_validation_steps: 32
  checkpoint_include_replay_buffer: false
reproducibility:
  seed: 42
  seeds:
  - 42
output:
  run_name: P16_ra_gt_rcpo_ablation
protocol:
  protocol_id: core13_v2_full_reset_20260522
  asset_universe_id: core13_v2
  data_cutoff_date: '2026-05-20'
rankability:
  rankable_in_unified_table: false
  diagnostic_status: diagnostic
security:
  path_whitelist:
  - /Users/chenjunming/Desktop/DRL_PM
