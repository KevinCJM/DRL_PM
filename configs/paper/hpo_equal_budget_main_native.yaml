experiment:
  type: hyperparameter_sweep
long_running: true
env:
  window_size: 20
feature_matrix:
  input_matrix_id: M0
  window_size: 20
feature_reduction:
  pca:
    enabled: false
model:
  latent_dim: 64
hpo:
  enabled: true
  equal_budget_across_models: true
  native_only: true
  n_trials_per_model: 50
  metric: validation_sharpe_minus_drawdown_turnover_penalty
  objective: validation_sharpe_minus_drawdown_turnover_penalty
  direction: maximize
  selection_split: validation
  final_report_split: test
  trainable_models:
    - full_dqn_gated_multitask_cnn_ppo
    - ppo_native
    - cnn_ppo_native
    - bernoulli_gated_ppo_native
    - dqn_template_native
    - eiie_native
    - pgportfolio_eiie_native
  search_space:
    ppo_lr:
      type: float
      low: 0.0001
      high: 0.001
      log: true
    dqn_lr:
      type: float
      low: 0.0001
      high: 0.001
      log: true
    optimizer.weight_decay:
      type: float
      low: 0.00001
      high: 0.001
      log: true
    ppo.entropy_coef:
      type: float
      low: 0.0
      high: 0.02
baselines:
  native_rl:
    enabled_models:
      - ppo_native
      - cnn_ppo_native
      - bernoulli_gated_ppo_native
      - dqn_template_native
      - eiie_native
      - pgportfolio_eiie_native
    epochs: 2
    max_train_steps: 128
    max_validation_steps: 128
    max_gradient_updates_per_epoch: 16
dqn:
  batch_size: 32
  warmup_steps: 32
  target_update_interval: 32
  use_prioritized_replay: false
  per_enabled: false
training:
  epochs: 2
  max_train_steps: 128
  max_validation_steps: 128
  checkpoint_include_replay_buffer: false
statistics:
  primary_metric: sharpe
reproducibility:
  seed: 42
  seeds: [42, 123, 2024, 3407, 9999]
output:
  run_name: P7_hpo_equal_budget_native
security:
  path_whitelist:
    - /Users/chenjunming/Desktop/DRL_PM
