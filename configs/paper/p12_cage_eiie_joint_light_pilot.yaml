experiment:
  type: hyperparameter_sweep
data_governance:
  return_source: adj_nav
  valuation_source: adj_nav
  reward_return_source: adj_nav
  metrics_return_source: adj_nav
  execution_price_source: ohlcv
  valuation_table: core13_adj_nav
  execution_price_table: core13_ohlcv
  valuation_execution_split: true
  reward_valuation_split: true
baselines:
  traditional: []
  deep: []
  native_rl:
    enabled_models:
    - cage_eiie_joint_light
    epochs: 1
    max_train_steps: 32
    max_validation_steps: 32
    max_gradient_updates_per_epoch: 8
cage_eiie:
  enabled: true
  variant: joint_light
  gate_scoring:
    mode: normalized
    alpha_scale: 0.001
    turnover_scale: 0.05
    cost_scale: 0.001
    cvar_scale: 0.01
    drawdown_scale: 0.05
    alpha_activation_threshold: 0.25
    hold_opportunity_penalty: -0.2
    turnover_budget_per_trade: 0.05
    cost_budget_per_trade: 0.001
    lambda_turnover: 0.2
    lambda_cost: 0.2
    lambda_cvar: 0.2
    lambda_drawdown: 0.2
hpo:
  enabled: true
  equal_budget_across_models: true
  run_mode: diagnostic
  n_trials_per_model: 5
  selection_split: validation
  final_report_split: test
  trainable_models:
  - cage_eiie_joint_light
  search_space:
    cage_eiie.lambda_turnover:
      type: float
      low: 0.5
      high: 4.0
  metric: validation_return_risk_cost_constrained
  objective: validation_return_risk_cost_constrained
  activity_constraints:
    enabled: true
    scope_baseline_families:
    - new_model_extension
    - platform_native_rl
    scope_activity_protocols:
    - daily_gate_with_cost_constraint
    min_model_rebalance_hit_rate: 0.05
    max_model_rebalance_hit_rate: 0.6
    min_non_initial_turnover_per_opportunity: 0.002
    max_average_turnover: 0.03
    hit_rate_underuse_penalty: 5.0
    turnover_underuse_penalty: 5.0
    turnover_overuse_penalty: 2.0
    cost_budget: 0.01
    cost_over_budget_penalty: 10.0
new_model_protocol:
  phase: P12_joint_light_pilot
  model_extension_id: core13_v2_p12_p13_20260524
  test_used_for_model_selection: false
training:
  epochs: 1
  max_train_steps: 32
  max_validation_steps: 32
  checkpoint_include_replay_buffer: false
output:
  run_name: P12_cage_eiie_joint_light_pilot
protocol:
  protocol_id: core13_v2_full_reset_20260522
  asset_universe_id: core13_v2
  data_cutoff_date: '2026-05-20'
rankability:
  rankable_in_unified_table: false
  diagnostic_status: diagnostic
security:
  path_whitelist:
  - /Users/chenjunming/Desktop/DRL_PM
rebalance:
  mode: daily
execution_activity:
  protocol: daily_gate_with_cost_constraint
  scheduler_blocks_model_actions: false
  activity_gate_enforced: true
  turnover_optimization_protocol_id: turnover_active_v1
  min_model_rebalance_hit_rate: 0.05
  max_model_rebalance_hit_rate: 0.6
  min_non_initial_turnover_per_opportunity: 0.002
