experiment:
  type: baseline_comparison
baselines:
  enabled: true
  traditional:
    - equal_weight
  deep: []
  native_rl:
    enabled_models:
      - ppo_dqn_hierarchical_reimplementation
      - hybrid_dqn_optimizer_reimplementation
